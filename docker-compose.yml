version: '3.9'
services:
  app:
    build:
      dockerfile: dockerfile
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    # command: npm run dev
    environment:
      - NODE_ENV=development
      - AUTH_TRUST_HOST=true
      - AUTH_URL=http://localhost:3000
    restart: unless-stopped

  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - '5432:5432'
  adminer:
    image: adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - db